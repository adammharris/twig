name: Release

# Publishes the Twig Rust crates to crates.io and cuts a GitHub release when a
# version tag is pushed. Tag the commit `v<major>.<minor>.<patch>` (matching the
# crate/`build.zig.zon` version) to trigger it, e.g. `git tag v1.0.0 && git push
# origin v1.0.0`. `workflow_dispatch` allows a manual dry run (publish is skipped
# unless the run was triggered by a tag).
#
# The crate graph is published bottom-up, because crates.io rejects an upload
# whose dependencies aren't already on the index:
#   1. twig-sys-<target> payload crates (prebuilt libtwig.a, no deps)
#   2. twig-sys        (FFI + build script; depends on the payload crates)
#   3. twig-doc        (safe API; depends on twig-sys)
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the GitHub release

env:
  ZIG_VERSION: "0.16.0"
  # Ordered list consumed by the publish/dry-run steps. Payload crates first,
  # then the FFI crate, then the safe wrapper. Keep in sync with
  # bindings/rust/prebuilt-targets.tsv.
  PAYLOAD_CRATES: >-
    twig-sys-macos-arm64
    twig-sys-linux-x64-gnu
    twig-sys-linux-arm64-gnu
    twig-sys-windows-x64-msvc
    twig-sys-wasm32

jobs:
  publish:
    name: publish crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Zig ${{ env.ZIG_VERSION }}
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Cross-compile every tier-1 target's libtwig.a into its payload crate's
      # lib/ (git-ignored). Zig cross-compiles all targets from this one runner.
      # Must run before any packaging: the payload crates' `include` list ships
      # lib/<archive>, and the workspace test below exercises the prebuilt path.
      - name: Build prebuilt payload libraries
        working-directory: bindings/rust
        run: bash scripts/build-payload-lib.sh all

      # Gate the release on a green build/test of both the Zig core and the
      # bindings before anything is published. `cargo test --workspace` links
      # the just-built prebuilt archive for this runner's target (path deps
      # resolve locally; no registry needed).
      - name: Zig test
        run: zig build test

      - name: Rust binding test
        working-directory: bindings/rust
        run: cargo test --workspace

      # The Rust workspace version (package + internal dep versions) must track
      # build.zig.zon (the single source of truth). Fails with a fix hint on drift.
      - name: Check version sync
        run: bash scripts/sync-version.sh --check

      # Fail early if the pushed tag doesn't match the canonical version, so a
      # mistagged release can't publish the wrong number.
      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="$(sed -n 's/^[[:space:]]*\.version = "\([^"]*\)".*/\1/p' build.zig.zon | head -1)"
          tag="${GITHUB_REF_NAME#v}"
          echo "build.zig.zon=$version tag=$tag"
          if [ "$version" != "$tag" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match project version $version"
            exit 1
          fi

      # Sync the Zig source into bindings/rust/twig-sys/zig so the published
      # twig-sys crate is self-contained (source-build fallback for targets
      # without a payload). --allow-dirty because that tree is untracked.
      - name: Vendor Zig source
        run: bash bindings/rust/twig-sys/vendor-zig.sh

      # Ordered publish: payload crates -> twig-sys -> twig-doc. Two hazards this
      # loop is built to survive, both hit hardest on the FIRST release (when
      # every crate is brand new):
      #   * crates.io throttles *new-crate* creation to a small burst (~5) then a
      #     slow refill. Publishing >5 first-time crates trips a 429; we wait out
      #     one refill window (~11 min) and retry rather than failing the release.
      #     (Later releases publish new *versions*, which have a far higher limit,
      #     so this path effectively only matters once.)
      #   * a re-run after a partial publish must not choke on the crates that DID
      #     land — an "already uploaded/exists" response is treated as success, so
      #     the job is idempotent and safe to re-run.
      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: bindings/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail
          publish() {
            local crate="$1" attempt out
            for attempt in $(seq 1 8); do
              echo "::group::cargo publish -p $crate (attempt $attempt)"
              if out=$(cargo publish -p "$crate" --allow-dirty 2>&1); then
                echo "$out"; echo "::endgroup::"; return 0
              fi
              echo "$out"; echo "::endgroup::"
              if echo "$out" | grep -qiE 'already (uploaded|exists)'; then
                echo "::notice::$crate already on crates.io — skipping"; return 0
              fi
              if echo "$out" | grep -qiE 'rate limit|too many|429|try again'; then
                echo "::warning::$crate rate-limited by crates.io (new-crate burst); waiting 11m for refill"
                sleep 660; continue
              fi
              echo "$crate publish failed; retrying in 30s (index propagation?)"
              sleep 30
            done
            echo "::error::failed to publish $crate after retries"; return 1
          }
          for crate in $PAYLOAD_CRATES; do publish "$crate"; done
          publish twig-sys
          publish twig-doc

      # Manual (workflow_dispatch) dry run: fully verify what can be verified
      # without touching the registry — every payload crate packages and
      # verify-builds standalone. twig-sys/twig-doc can only be packaged once
      # their deps are on the index (crates.io rejects otherwise), so they're
      # covered by the build/test steps above instead.
      - name: Package payload crates (dry run)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        working-directory: bindings/rust
        run: |
          set -euo pipefail
          for crate in $PAYLOAD_CRATES; do
            echo "::group::cargo package -p $crate"
            cargo package -p "$crate" --allow-dirty
            echo "::endgroup::"
          done

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
